<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#F6F7FB"/>
  <text x="80" y="88" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">
    PR #23012 preview
  </text>
  <text x="80" y="124" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="20">
    Grouping stays visual on the Traces page, while the Chat Sessions page switches to distinct session counts.
  </text>

  <rect x="72" y="170" width="500" height="500" rx="28" fill="white" stroke="#D1D5DB" stroke-width="2"/>
  <text x="108" y="224" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">
    Traces page
  </text>
  <text x="108" y="258" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="18">
    Grouped by session for display only
  </text>
  <rect x="108" y="292" width="428" height="72" rx="18" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="136" y="336" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    1,248 of 9,800 traces
  </text>
  <text x="108" y="408" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="22">
    • Session grouping toggle is ON
  </text>
  <text x="108" y="448" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="22">
    • Toolbar count still reflects traces
  </text>
  <text x="108" y="488" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="22">
    • Additional filters still apply to the search query
  </text>
  <rect x="108" y="536" width="180" height="44" rx="22" fill="#E5F0FF"/>
  <text x="138" y="564" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">
    countSessions: false
  </text>

  <rect x="628" y="170" width="500" height="500" rx="28" fill="white" stroke="#D1D5DB" stroke-width="2"/>
  <text x="664" y="224" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">
    Chat Sessions page
  </text>
  <text x="664" y="258" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="18">
    Uses the new backend session_count metric from PR #23011
  </text>
  <rect x="664" y="292" width="428" height="72" rx="18" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="692" y="336" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    120 of 450 sessions
  </text>
  <text x="664" y="408" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="22">
    • Session grouping is forced for this view
  </text>
  <text x="664" y="448" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="22">
    • Toolbar count reflects distinct session IDs
  </text>
  <text x="664" y="488" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="22">
    • Fallback path deduplicates loaded session metadata
  </text>
  <rect x="664" y="536" width="174" height="44" rx="22" fill="#E7F7ED"/>
  <text x="694" y="564" fill="#15803D" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">
    countSessions: true
  </text>

  <text x="80" y="718" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="18">
    Visual summary added for review; exact counts are illustrative and meant to show the behavior difference between the two views.
  </text>
</svg>
