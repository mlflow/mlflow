// Proto definition for MLflow OSS-native label schemas.
// Schemas are experiment-scoped UI rendering hints that drive SME review
// widgets in the labeling UI. They do not gate or validate assessment
// writes; the entity is intentionally lightweight and the schema_id is
// soft-referenced from assessments.
syntax = "proto2";

package mlflow.label_schemas;

import "databricks.proto";

option java_package = "org.mlflow.api.proto";
option py_generic_services = true;

// Type of label schema. Mirrors mlflow.genai.label_schemas.LabelSchemaType.
enum LabelSchemaType {
  // Default sentinel; the OSS server rejects unset types.
  LABEL_SCHEMA_TYPE_UNSPECIFIED = 0;
  // Feedback schema: bounded value space (pass/fail, options, min/max).
  FEEDBACK = 1;
  // Expectation schema: typically ground-truth labels supplied by SMEs.
  EXPECTATION = 2;
}

// Polarity hint for feedback-type InputCategorical schemas. Required for
// feedback-type categorical schemas so the UI knows which direction is
// positive (e.g., "good" vs "bad" sorting and coloring).
enum CategoricalSemanticPolarity {
  CATEGORICAL_SEMANTIC_POLARITY_UNSPECIFIED = 0;
  // The first option is the most positive.
  ASCENDING = 1;
  // The first option is the most negative.
  DESCENDING = 2;
}

// Pass/Fail input rendered as a thumbs-up / thumbs-down toggle.
// OSS-only; Databricks-routed schemas should use InputCategorical instead.
message InputPassFail {
  // Label shown next to the thumbs-up button (e.g., "Correct", "Pass").
  optional string positive_label = 1;
  // Label shown next to the thumbs-down button (e.g., "Incorrect", "Fail").
  optional string negative_label = 2;
}

// Categorical (single- or multi-select) input.
message InputCategorical {
  // The available options.
  repeated string options = 1;
  // Polarity hint. Required for feedback-type schemas.
  optional CategoricalSemanticPolarity semantic_polarity = 2;
  // When true, the widget renders multi-select and the assessment value
  // becomes a list of strings. Defaults to false (single-select).
  optional bool multi_select = 3;
}

// Numeric input bounded by min_value / max_value. For feedback-type
// schemas both bounds are required; for expectation-type schemas they
// are optional.
message InputNumeric {
  optional double min_value = 1;
  optional double max_value = 2;
}

// Discriminated input wrapper. Exactly one input type is set per schema.
message LabelSchemaInput {
  oneof input {
    InputPassFail pass_fail = 1;
    InputCategorical categorical = 2;
    InputNumeric numeric = 3;
  }
}

// Full label schema entity.
message LabelSchema {
  // Server-generated identifier.
  optional string schema_id = 1;
  // Parent experiment ID.
  optional string experiment_id = 2;
  // Schema name (1-150 chars, alphanumeric + underscore; unique within experiment).
  optional string name = 3;
  optional LabelSchemaType type = 4;
  // Display title shown to the SME (1-256 chars).
  optional string title = 5;
  // Optional supplementary guidance, <=1000 chars.
  optional string instruction = 6;
  // UI hint: whether the widget renders a free-form comment input.
  optional bool enable_comment = 7;
  optional LabelSchemaInput input = 8;
  // User who created the schema (OSS-native).
  optional string created_by = 9;
  // Creation timestamp in milliseconds since epoch.
  optional int64 created_at = 10;
  // Last update timestamp in milliseconds since epoch.
  optional int64 updated_at = 11;
}

// Request to create a new label schema.
message CreateLabelSchema {
  option (scalapb.message).extends = "com.databricks.rpc.RPC[$this.Response]";

  optional string experiment_id = 1 [(validate_required) = true];
  optional string name = 2 [(validate_required) = true];
  optional LabelSchemaType type = 3 [(validate_required) = true];
  optional string title = 4 [(validate_required) = true];
  optional LabelSchemaInput input = 5 [(validate_required) = true];
  optional string instruction = 6;
  optional bool enable_comment = 7;

  message Response {
    optional LabelSchema label_schema = 1;
  }
}

// Request to get a label schema by ID.
message GetLabelSchema {
  option (scalapb.message).extends = "com.databricks.rpc.RPC[$this.Response]";

  optional string schema_id = 1 [(validate_required) = true];

  message Response {
    optional LabelSchema label_schema = 1;
  }
}

// Request to get a label schema by (experiment_id, name).
message GetLabelSchemaByName {
  option (scalapb.message).extends = "com.databricks.rpc.RPC[$this.Response]";

  optional string experiment_id = 1 [(validate_required) = true];
  optional string name = 2 [(validate_required) = true];

  message Response {
    optional LabelSchema label_schema = 1;
  }
}

// Request to list label schemas for an experiment, paginated.
message ListLabelSchemas {
  option (scalapb.message).extends = "com.databricks.rpc.RPC[$this.Response]";

  optional string experiment_id = 1 [(validate_required) = true];
  optional int32 max_results = 2;
  optional string page_token = 3;

  message Response {
    repeated LabelSchema label_schemas = 1;
    optional string next_page_token = 2;
  }
}

// Request to sparse-update an existing label schema. `type` is immutable
// and is not accepted; pass non-None values only for the fields you want
// to change.
message UpdateLabelSchema {
  option (scalapb.message).extends = "com.databricks.rpc.RPC[$this.Response]";

  optional string schema_id = 1 [(validate_required) = true];
  optional string name = 2;
  optional string title = 3;
  optional string instruction = 4;
  optional bool enable_comment = 5;
  optional LabelSchemaInput input = 6;

  message Response {
    optional LabelSchema label_schema = 1;
  }
}

// Request to atomically create-or-replace a label schema by
// (experiment_id, name). `type` is immutable; mismatched type on
// replace is rejected.
message UpsertLabelSchema {
  option (scalapb.message).extends = "com.databricks.rpc.RPC[$this.Response]";

  optional string experiment_id = 1 [(validate_required) = true];
  optional string name = 2 [(validate_required) = true];
  optional LabelSchemaType type = 3 [(validate_required) = true];
  optional string title = 4 [(validate_required) = true];
  optional LabelSchemaInput input = 5 [(validate_required) = true];
  optional string instruction = 6;
  optional bool enable_comment = 7;

  message Response {
    optional LabelSchema label_schema = 1;
  }
}

// Request to delete a label schema. No-op when the schema doesn't exist.
message DeleteLabelSchema {
  option (scalapb.message).extends = "com.databricks.rpc.RPC[$this.Response]";

  optional string schema_id = 1 [(validate_required) = true];

  message Response {}
}
