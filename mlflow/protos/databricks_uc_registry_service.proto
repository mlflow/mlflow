// UC-native (governance + MLflow enrichment) model-registry endpoints. Mirrors the enriched
// UcEnrichedModelRegistryService in universe (uc-model-registry/api/proto/uc_enriched_model_registry.proto)
// plus the managed-catalog UnityCatalogService governance RPCs (delete / alias / temp-cred / tag),
// combined here into one service for the OSS client. Served on the /api/2.1/unity-catalog/* surface
// (the client resolves these with the /api/2.1 prefix and substitutes the
// {full_name_arg}/{version_arg}/{alias_arg}/{securable_*}/{subentity_name} path segments). These
// replace the legacy /mlflow/unity-catalog/* model RPCs; the declared response types are advisory
// (the client passes the concrete response proto to parse into at call time).
service UcEnrichedModelRegistryService {
  rpc getRegisteredModel(UcGetRegisteredModel) returns (UcRegisteredModelInfo) {
    option (rpc) = {
      endpoints: [
        {
          method: "GET"
          path: "/unity-catalog/models/{full_name_arg}"
          since: {
            major: 2
            minor: 1
          }
        }
      ]
      visibility: PUBLIC_UNDOCUMENTED
    };
  }
  rpc listRegisteredModels(UcListRegisteredModels) returns (UcListRegisteredModelsResponse) {
    option (rpc) = {
      endpoints: [
        {
          method: "GET"
          path: "/unity-catalog/models"
          since: {
            major: 2
            minor: 1
          }
        }
      ]
      visibility: PUBLIC_UNDOCUMENTED
    };
  }
  rpc createRegisteredModel(UcCreateRegisteredModel) returns (UcRegisteredModelInfo) {
    option (rpc) = {
      endpoints: [
        {
          method: "POST"
          path: "/unity-catalog/models"
          since: {
            major: 2
            minor: 1
          }
        }
      ]
      visibility: PUBLIC_UNDOCUMENTED
    };
  }
  rpc updateRegisteredModel(UcUpdateRegisteredModel) returns (UcRegisteredModelInfo) {
    option (rpc) = {
      endpoints: [
        {
          method: "PATCH"
          path: "/unity-catalog/models/{full_name_arg}"
          since: {
            major: 2
            minor: 1
          }
        }
      ]
      visibility: PUBLIC_UNDOCUMENTED
    };
  }
  rpc deleteRegisteredModel(DeleteRegisteredModel) returns (DeleteRegisteredModel.Response) {
    option (rpc) = {
      endpoints: [
        {
          method: "DELETE"
          path: "/unity-catalog/models/{full_name_arg}"
          since: {
            major: 2
            minor: 1
          }
        }
      ]
      visibility: PUBLIC_UNDOCUMENTED
    };
  }
  rpc setRegisteredModelAlias(SetRegisteredModelAlias) returns (SetRegisteredModelAlias.Response) {
    option (rpc) = {
      endpoints: [
        {
          method: "PUT"
          path: "/unity-catalog/models/{full_name_arg}/aliases/{alias_arg}"
          since: {
            major: 2
            minor: 1
          }
        }
      ]
      visibility: PUBLIC_UNDOCUMENTED
    };
  }
  rpc deleteRegisteredModelAlias(DeleteRegisteredModelAlias) returns (DeleteRegisteredModelAlias.Response) {
    option (rpc) = {
      endpoints: [
        {
          method: "DELETE"
          path: "/unity-catalog/models/{full_name_arg}/aliases/{alias_arg}"
          since: {
            major: 2
            minor: 1
          }
        }
      ]
      visibility: PUBLIC_UNDOCUMENTED
    };
  }
  rpc getModelVersionByAlias(UcGetModelVersionByAlias) returns (UcModelVersionInfo) {
    option (rpc) = {
      endpoints: [
        {
          method: "GET"
          path: "/unity-catalog/models/{full_name_arg}/aliases/{alias_arg}"
          since: {
            major: 2
            minor: 1
          }
        }
      ]
      visibility: PUBLIC_UNDOCUMENTED
    };
  }
  rpc createModelVersion(UcCreateModelVersion) returns (UcModelVersionInfo) {
    option (rpc) = {
      endpoints: [
        {
          method: "POST"
          path: "/unity-catalog/models/versions"
          since: {
            major: 2
            minor: 1
          }
        }
      ]
      visibility: PUBLIC_UNDOCUMENTED
    };
  }
  rpc updateModelVersion(UcUpdateModelVersion) returns (UcModelVersionInfo) {
    option (rpc) = {
      endpoints: [
        {
          method: "PATCH"
          path: "/unity-catalog/models/{full_name_arg}/versions/{version_arg}"
          since: {
            major: 2
            minor: 1
          }
        }
      ]
      visibility: PUBLIC_UNDOCUMENTED
    };
  }
  rpc getModelVersion(UcGetModelVersion) returns (UcModelVersionInfo) {
    option (rpc) = {
      endpoints: [
        {
          method: "GET"
          path: "/unity-catalog/models/{full_name_arg}/versions/{version_arg}"
          since: {
            major: 2
            minor: 1
          }
        }
      ]
      visibility: PUBLIC_UNDOCUMENTED
    };
  }
  rpc listModelVersions(UcListModelVersions) returns (UcListModelVersionsResponse) {
    option (rpc) = {
      endpoints: [
        {
          method: "GET"
          path: "/unity-catalog/models/{full_name_arg}/versions"
          since: {
            major: 2
            minor: 1
          }
        }
      ]
      visibility: PUBLIC_UNDOCUMENTED
    };
  }
  rpc finalizeModelVersion(UcFinalizeModelVersion) returns (UcModelVersionInfo) {
    option (rpc) = {
      endpoints: [
        {
          method: "PATCH"
          path: "/unity-catalog/models/{full_name_arg}/versions/{version_arg}/finalize"
          since: {
            major: 2
            minor: 1
          }
        }
      ]
      visibility: PUBLIC_UNDOCUMENTED
    };
  }
  rpc deleteModelVersion(DeleteModelVersion) returns (DeleteModelVersion.Response) {
    option (rpc) = {
      endpoints: [
        {
          method: "DELETE"
          path: "/unity-catalog/models/{full_name_arg}/versions/{version_arg}"
          since: {
            major: 2
            minor: 1
          }
        }
      ]
      visibility: PUBLIC_UNDOCUMENTED
    };
  }
  rpc generateTemporaryModelVersionCredential(GenerateTemporaryModelVersionCredential) returns (GenerateTemporaryModelVersionCredential.Response) {
    option (rpc) = {
      endpoints: [
        {
          method: "POST"
          path: "/unity-catalog/temporary-model-version-credentials"
          since: {
            major: 2
            minor: 1
          }
        }
      ]
      visibility: PUBLIC_UNDOCUMENTED
    };
  }
  rpc updateTagSecurableAssignments(UpdateTagSecurableAssignments) returns (UpdateTagSecurableAssignments.Response) {
    option (rpc) = {
      endpoints: [
        {
          method: "PATCH"
          path: "/unity-catalog/securable-tags/{securable_type}/{securable_full_name}"
          since: {
            major: 2
            minor: 1
          }
        }
      ]
      visibility: PUBLIC_UNDOCUMENTED
    };
  }
  rpc updateTagSubentityAssignments(UpdateTagSubentityAssignments) returns (UpdateTagSubentityAssignments.Response) {
    option (rpc) = {
      endpoints: [
        {
          method: "PATCH"
          path: "/unity-catalog/subentity-tags/{securable_type}/{securable_full_name}/{subentity_name}"
          since: {
            major: 2
            minor: 1
          }
        }
      ]
      visibility: PUBLIC_UNDOCUMENTED
    };
  }
}
