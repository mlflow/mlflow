name: review

on:
  issue_comment:
    types: [created]
  pull_request:
    paths:
      - ".github/workflows/review.yml"
      - ".claude/commands/pr-review.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    timeout-minutes: 30
    outputs:
      bot-approved: ${{ steps.check-approval.outputs.approved }}
    # Security: Only run for authorized users.
    # - pull_request: Only run for non-fork PRs
    # - issue_comment: BOTH PR author and commenter must be authorized (can't trust external PRs)
    if: >
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       github.event.pull_request.draft == false &&
       contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association))
      ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       (
        contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.issue.author_association) ||
        (github.event.issue.user.login == 'Copilot' && github.event.issue.user.type == 'Bot')
       ) &&
       contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) &&
       startsWith(github.event.comment.body, '/review'))
    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: React to comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          retries: 3
          script: |
            const { comment } = context.payload;

            // Check user association - only allow OWNER, MEMBER, or COLLABORATOR
            const authorAssociation = comment.author_association;
            const isAllowed = ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(authorAssociation);

            let message;
            if (isAllowed) {
              const workflowUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}?pr=${context.issue.number}`;
              message = `🚀 [Review running...](${workflowUrl})`;
            } else {
              message = `⚠️ Only repository maintainers and collaborators are allowed to trigger this workflow. Your association: ${authorAssociation}`;
            }

            const updatedBody = `${comment.body}\n\n---\n\n${message}`;

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: comment.id,
              body: updatedBody,
            });

            if (!isAllowed) {
              throw new Error(`User not allowed to trigger workflow: ${comment.user.login} (association: ${authorAssociation})`);
            }
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}
      - uses: ./.github/actions/setup-python
        with:
          pin-micro-version: false
          enable-uv-cache: false
      - name: Install Claude CLI
        run: |
          .claude/scripts/install-claude.sh
      - name: Verify Claude CLI
        run: |
          claude --version

      - name: Extract optional prompt from comment
        if: github.event_name == 'issue_comment'
        id: prompt
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          PROMPT=$(echo "$COMMENT_BODY" | sed 's|^/review||')
          {
            echo 'prompt<<PROMPT_EOF'
            echo "$PROMPT"
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Review
        id: review
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          PROMPT: ${{ steps.prompt.outputs.prompt }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          OUTPUT_FILE="/tmp/output.json"

          # Safe construction using arrays - PROMPT is passed as separate argument to prevent shell injection
          if [ "$EVENT_NAME" = "pull_request" ]; then
            ARGS=("Hi")
          else
            ARGS=("/pr-review")
            [ -n "$PROMPT" ] && ARGS+=("$PROMPT")
          fi

          EXIT_CODE=0
          # Note: ARGS[*] is intentional - claude CLI expects a single prompt string
          timeout 20m claude --model claude-opus-4-6 --print --verbose --output-format stream-json "${ARGS[*]}" | .claude/scripts/stream.sh "$OUTPUT_FILE" || EXIT_CODE=$?
          if [ "${EXIT_CODE:-0}" -eq 124 ]; then
            echo "Warning: Claude command timed out after 20 minutes"
          elif [ "${EXIT_CODE:-0}" -ne 0 ]; then
            echo "Error: Claude command failed with exit code $EXIT_CODE"
            cat "$OUTPUT_FILE"
            exit $EXIT_CODE
          fi

      - name: Report review results
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          retries: 3
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const { comment } = context.payload;

            // Read Claude output from file instead of environment variable
            const outputPath = '/tmp/output.json';
            let claudeOutput = '';
            try {
              if (fs.existsSync(outputPath)) {
                claudeOutput = fs.readFileSync(outputPath, 'utf8');
              }
            } catch (e) {
              console.log('Failed to read Claude output file:', e);
            }

            const workflowUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}?pr=${context.issue.number}`;
            let resultLine = `✅ [Review](${workflowUrl}) completed`;

            // Extract and display Claude's result from JSON output
            if (claudeOutput) {
              try {
                const events = claudeOutput.trim().split('\n').filter(Boolean).map(JSON.parse);
                const resultEvent = events.findLast(({ type }) => type === 'result');
                if (resultEvent) {
                  const seconds = (resultEvent.duration_ms / 1000).toFixed(1);
                  const tokens = (resultEvent.usage?.input_tokens ?? 0) + (resultEvent.usage?.output_tokens ?? 0);
                  const cost = (Math.round(resultEvent.total_cost_usd * 100) / 100).toFixed(2);
                  resultLine += ` (${seconds}s, ${resultEvent.num_turns} turns, ${tokens} tokens, $${cost})`;
                  resultLine += `\n<details><summary>Review Output</summary>\n\n${resultEvent.result}\n\n</details>`;
                }
              } catch (e) {
                console.log('Failed to parse Claude output as JSON:', e);
              }
            }

            console.log('Result line to post:', resultLine);

            const { data: currentComment } = await github.rest.issues.getComment({
              owner,
              repo,
              comment_id: comment.id,
            });

            const originalBody = currentComment.body.split('\n\n---\n\n🚀 ')[0];
            const updatedBody = `${originalBody}\n\n---\n\n${resultLine}`;

            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: comment.id,
              body: updatedBody
            });

      - name: Check bot approval
        id: check-approval
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          COMMENT_CREATED_AT: ${{ github.event.comment.created_at }}
        run: |
          count=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            --jq '[.[]
                   | select(.user.login == "mlflow-app[bot]"
                            and .state == "APPROVED"
                            and .submitted_at >= env.COMMENT_CREATED_AT)
                  ] | length')
          approved=$([ "$count" -gt 0 ] && echo true || echo false)
          echo "approved=$approved" >> "$GITHUB_OUTPUT"

  post-review:
    needs: review
    if: github.event_name == 'issue_comment' && needs.review.outputs.bot-approved == 'true'
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      actions: write
      pull-requests: read
    steps:
      - name: Approve queued rerun workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          COMMENT_CREATED_AT: ${{ github.event.comment.created_at }}
        run: |
          head_sha=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq '.headRefOid')

          # Poll for up to ~30s: the `rerun` workflow may not be queued yet
          # when this step starts, since mlflow-app[bot]'s approval review
          # fires it asynchronously.
          run_ids=""
          for i in $(seq 1 6); do
            run_ids=$(
              gh api --paginate "repos/${REPO}/actions/runs?head_sha=${head_sha}" \
                --jq '.workflow_runs[]
                      | select(.name == "rerun"
                               and .conclusion == "action_required"
                               and .actor.login == "mlflow-app[bot]"
                               and .created_at >= env.COMMENT_CREATED_AT)
                      | .id'
            )
            [ -n "$run_ids" ] && break
            echo "No action_required rerun yet (attempt $i); sleeping 5s..."
            sleep 5
          done

          if [ -z "$run_ids" ]; then
            echo "Timed out waiting for action_required rerun workflows"
            exit 0
          fi

          # Use /rerun since /approve fails with "not a fork pull request" on runs from `pull_request_review` events.
          while IFS= read -r run_id; do
            gh api --method POST "repos/${REPO}/actions/runs/${run_id}/rerun" >/dev/null \
              && echo "Approved run $run_id" \
              || echo "Failed to approve run $run_id"
          done <<< "$run_ids"
