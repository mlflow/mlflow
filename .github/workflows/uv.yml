name: uv

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/uv.yml
      - .github/workflows/uv.js
  schedule:
    # Run this workflow on Monday and Thursday at 1:00 UTC (10:00 JST)
    - cron: "0 1 * * 1,4"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  uv:
    # Skip scheduled runs on forks
    # TODO: Re-enable after https://github.com/BerriAI/litellm/issues/24512 is resolved
    if: false && (github.event_name != 'schedule' || github.repository == 'mlflow/mlflow')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
      - uses: ./.github/actions/setup-python
      - name: Update uv.lock and create PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          retries: 3
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const script = require('.github/workflows/uv.js');
            await script({ github, context });
