name: Helm Chart

on:
  push:
    branches: [master]
    paths:
      - charts/**
      - docker/Dockerfile
  pull_request:
    paths:
      - charts/**
      - docker/Dockerfile

defaults:
  run:
    shell: bash

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0

      - name: Lint
        run: helm lint charts/

      - name: Render templates
        run: helm template mlflow charts/

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Get MLflow version
        id: version
        run: |
          echo "version=$(grep '^appVersion' charts/Chart.yaml | awk '{print $2}' | tr -d '"')" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VERSION=${{ steps.version.outputs.version }} \
            -t mlflow:ci \
            docker/

      - name: Load image into Kind
        run: kind load docker-image mlflow:ci --name chart-testing

      - name: Deploy chart
        run: |
          helm install mlflow charts/ \
            --set image.repository=mlflow \
            --set image.tag=ci \
            --set image.pullPolicy=Never \
            --set fullnameOverride=mlflow \
            --set mlflow.backendStoreUri=sqlite:////tmp/mlflow.db \
            --set mlflow.artifactsDestination=/tmp/mlartifacts \
            --wait \
            --timeout 5m

      - name: Verify MLflow is reachable
        run: |
          kubectl port-forward svc/mlflow 5000:5000 &
          curl --retry 10 --retry-connrefused --retry-delay 3 --fail http://localhost:5000/health

      - name: Print container logs
        if: always()
        run: kubectl logs -l app.kubernetes.io/name=mlflow --tail=-1
