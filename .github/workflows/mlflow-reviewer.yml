name: NaiLaOpus

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  # Single group per PR. cancel-in-progress is false so the auto-trigger run
  # always finishes; subsequent /cheese invocations queue behind it. The
  # orchestrator's head_sha cache dedupes a queued /cheese against a same-SHA
  # auto run, so /cheese --no-cache is the only way to force a re-review.
  group: nailaopus-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  review:
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       startsWith(github.event.comment.body, '/cheese') &&
       contains(fromJSON('["MEMBER", "COLLABORATOR", "OWNER"]'), github.event.comment.author_association))
      ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       contains(fromJSON('["MEMBER", "COLLABORATOR", "OWNER"]'), github.event.pull_request.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Resolve PR number and trigger source
        id: ctx
        env:
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_PR: ${{ github.event.issue.number }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            echo "pr=$ISSUE_PR" >> "$GITHUB_OUTPUT"
            echo "trigger=comment" >> "$GITHUB_OUTPUT"
          else
            echo "pr=$PR_NUM" >> "$GITHUB_OUTPUT"
            echo "trigger=auto" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate App installation token (multi-repo)
        id: app_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.NAILAOPUS_APP_ID }}
          private-key: ${{ secrets.NAILAOPUS_APP_KEY }}
          owner: mlflow

      - name: React eyes on trigger comment
        if: steps.ctx.outputs.trigger == 'comment'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          gh api \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -X POST -f content=eyes || true

      - name: Reject fork PRs (comment-triggered only)
        if: steps.ctx.outputs.trigger == 'comment'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR: ${{ steps.ctx.outputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          # The pull_request branch of the job-level `if:` already requires
          # head.repo.full_name == github.repository. The issue_comment payload
          # does not carry head_repo, so we fetch it here and refuse to run if
          # the PR head is on a fork: the subsequent checkout + uv pip install
          # would execute fork-controlled build hooks with App-token + Anthropic
          # secrets in scope.
          set -e
          head_repo=$(gh api "repos/$REPO/pulls/$PR" --jq .head.repo.full_name)
          if [ "$head_repo" != "$REPO" ]; then
            echo "Refusing to run on fork PR (head=$head_repo, expected=$REPO)."
            exit 1
          fi

      - name: Enforce per-PR daily rate limit
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR: ${{ steps.ctx.outputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          since=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v-24H '+%Y-%m-%dT%H:%M:%SZ')
          count=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq "[.[] | select(.user.login == \"NaiLaOpus[bot]\") | select(.created_at > \"$since\")] | length")
          if [ "$count" -ge 5 ]; then
            echo "Rate limit hit: $count bot comments in the last 24h on PR $PR (max 5)."
            exit 1
          fi

      - name: Tag PR as reviewed by NaiLaOpus
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR: ${{ steps.ctx.outputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          gh label create nailaopus-reviewed \
            --repo "$REPO" \
            --color ededed \
            --description "PR was reviewed by NaiLaOpus[bot] at least once" \
            2>/dev/null || true
          gh issue edit "$PR" \
            --repo "$REPO" \
            --add-label nailaopus-reviewed || true

      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository }}
          ref: refs/pull/${{ steps.ctx.outputs.pr }}/head
          fetch-depth: 0
          path: mlflow
          token: ${{ steps.app_token.outputs.token }}

      - name: Checkout mlflow/internal (orchestrator code)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: mlflow/internal
          path: internal
          token: ${{ steps.app_token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install orchestrator
        working-directory: internal/mlflow-reviewer
        run: uv pip install -e ".[test]" --system

      - name: Parse review flags (comment-triggered only)
        id: flags
        if: steps.ctx.outputs.trigger == 'comment'
        env:
          BODY: ${{ github.event.comment.body }}
        run: |
          set -e
          flags=""
          if echo "$BODY" | grep -q -- '--no-cache'; then flags="$flags --no-cache"; fi
          if echo "$BODY" | grep -q -- '--hybrid'; then flags="$flags --hybrid"; fi
          echo "flags=$flags" >> "$GITHUB_OUTPUT"

      - name: Run NaiLaOpus (dry-run by default; Bridge 2 adds --no-dry-run to enable posting)
        working-directory: mlflow
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR: ${{ steps.ctx.outputs.pr }}
          REPO: ${{ github.repository }}
          # FLAGS is empty on auto-triggered runs by design: the flags step
          # only runs for /cheese comments, and there is no comment body to
          # parse on a pull_request event.
          FLAGS: ${{ steps.flags.outputs.flags }}
        # Inputs flow through env vars rather than `${{ }}` interpolation
        # directly into the shell, so an unexpected character in any value
        # (today none reach here, but the pattern is hardening for drift)
        # is treated as data, not as code. $FLAGS is intentionally unquoted
        # so it word-splits into separate argv entries.
        run: |
          mlflow-reviewer "$PR" --repo "$REPO" $FLAGS

      - name: React +1 on success (comment-triggered only)
        if: success() && steps.ctx.outputs.trigger == 'comment'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          gh api \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -X POST -f content=+1 || true

      - name: React -1 and post failure comment on failure
        if: failure()
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          if [ "${{ steps.ctx.outputs.trigger }}" = "comment" ]; then
            gh api \
              "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
              -X POST -f content=-1 || true
          fi
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # printf with a single-quoted format string keeps backticks literal
          # (no command substitution) and avoids the multi-line YAML quoting
          # bug where embedded backticks broke shell parsing.
          body=$(printf '`NaiLaOpus` failed. See [run logs](%s).\n\n---\nPosted by `NaiLaOpus` (auto-generated).' "$run_url")
          gh api \
            "repos/${{ github.repository }}/issues/${{ steps.ctx.outputs.pr }}/comments" \
            -X POST -f body="$body" || true
