name: build-docs

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - dev/build_docs.py
      - .github/workflows/build-docs.yml
  workflow_dispatch:
    inputs:
      ref:
        description: "The branch, tag or SHA to checkout from (e.g., branch-3.0)"
        required: true
      command:
        description: "Command to run"
        required: true
        type: choice
        options:
          - build-docs
          - release-post
      dry_run:
        description: "Skip push and PR creation"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-python
      - uses: ./.github/actions/setup-node
      - name: Test build-docs
        run: |
          uv run dev/build_docs.py --dry-run build-docs
      - name: Test release-post
        run: |
          uv run dev/build_docs.py --dry-run release-post

  # TODO: Remove this job after verifying push and PR creation work
  test-push:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: mlflow-legacy-website,mlflow-website
          owner: mlflow
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: branch-3.12
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          path: pr-source
          sparse-checkout: dev/build_docs.py
          sparse-checkout-cone-mode: false
      - name: Copy dev/build_docs.py from PR
        run: cp pr-source/dev/build_docs.py dev/build_docs.py
      - uses: ./.github/actions/free-disk-space
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-python
      - uses: ./.github/actions/setup-node
      - name: Test build-docs with push and PR creation
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          uv run dev/build_docs.py build-docs --gtm-id GTM-N6WMTTJ

  run:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: mlflow-legacy-website,mlflow-website
          owner: mlflow
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/free-disk-space
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-python
      - uses: ./.github/actions/setup-node
      - name: Run
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          COMMAND: ${{ inputs.command }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          DRY_RUN_FLAG=""
          if [ "$DRY_RUN" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          GTM_FLAG=""
          if [ "$COMMAND" = "build-docs" ]; then
            GTM_FLAG="--gtm-id GTM-N6WMTTJ"
          fi

          uv run dev/build_docs.py \
            $DRY_RUN_FLAG \
            "$COMMAND" \
            $GTM_FLAG
