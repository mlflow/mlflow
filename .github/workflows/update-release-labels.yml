name: Update Release Labels

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_version:
        description: "Target release version (e.g., 3.1.4)"
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  update-labels:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-node

      - name: Install and build tools
        working-directory: .github/scripts
        run: npm ci && npm run build

      - name: Update release labels
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          retries: 3
          script: |
            const { updateReleaseLabels } = require('.github/scripts/dist/bundle.js');
            await updateReleaseLabels({ github, context });
