name: xtest-viz

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - .github/workflows/xtest-viz.yml
      - dev/xtest_viz.py
  schedule:
    # Run daily at 16:00 UTC (3 hours after cross-version-tests.yml at 13:00)
    - cron: "0 16 * * *"

defaults:
  run:
    shell: bash

jobs:
  xtest-viz:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    if: >
      (
        github.event_name == 'schedule' &&
        github.repository == 'mlflow/dev'
      ) || (
        github.event_name == 'pull_request' &&
        (github.event.pull_request.draft == false || github.event.pull_request.user.login == 'Copilot' && github.event.pull_request.user.type == 'Bot')
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: ./.github/actions/setup-python

      - name: Generate cross-version test visualization
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Cross-Version Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          uv run dev/xtest_viz.py \
            --days 14 \
            --repo mlflow/dev >> $GITHUB_STEP_SUMMARY
