name: JS

on:
  workflow_dispatch:
  push:
    paths:
      - mlflow/server/js/**
      - .github/actions/check-component-ids/**
      - .github/workflows/js.yml
    branches:
      - master
      - branch-[0-9]+.[0-9]+
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - mlflow/server/js/**
      - .github/actions/check-component-ids/**
      - .github/workflows/js.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  check-component-ids:
    if: github.event_name != 'pull_request' || (github.event.pull_request.draft == false || github.event.pull_request.user.login == 'Copilot' && github.event.pull_request.user.type == 'Bot')
    permissions:
      contents: read
    timeout-minutes: 5
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Check componentId registry
        uses: ./.github/actions/check-component-ids

  js:
    if: github.event_name != 'pull_request' || (github.event.pull_request.draft == false || github.event.pull_request.user.login == 'Copilot' && github.event.pull_request.user.type == 'Bot')
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        option: [--testPathPattern, --testPathIgnorePatterns]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mlflow/server/js
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node
      - name: Install dependencies
        run: |
          yarn install --immutable
      - name: Run lint
        run: |
          yarn lint
      - name: Run prettier
        run: |
          yarn prettier:check
      # TODO: Disabled for now. Revisit after DAIS.
      # - name: Run knip
      #   run: |
      #     yarn knip
      - name: Run extract-i18n lint
        run: |
          yarn i18n:check
      - name: Run type-check
        run: |
          yarn type-check
      - name: Start resource sampler
        run: |
          nohup bash -c '
            PREV_TOTAL=0; PREV_IDLE=0
            while true; do
              read _ U N S I IO IRQ SI ST _ < /proc/stat
              T=$((U+N+S+I+IO+IRQ+SI+ST))
              if [ "$PREV_TOTAL" -ne 0 ]; then
                DT=$((T-PREV_TOTAL))
                DI=$(( (I+IO)-PREV_IDLE ))
                CPU=$(( DT>0 ? 100*(DT-DI)/DT : 0 ))
              else
                CPU=0
              fi
              PREV_TOTAL=$T
              PREV_IDLE=$((I+IO))
              MEM=$(awk "/MemTotal/{t=\$2}/MemAvailable/{a=\$2}END{print int((t-a)/1024)}" /proc/meminfo)
              printf "%s,%s,%s\n" "$(date +%s)" "$CPU" "$MEM"
              sleep 2
            done' > /tmp/metrics.csv 2>&1 &
          echo $! > /tmp/sampler.pid
      - name: Run tests
        env:
          MATRIX_OPTION: ${{ matrix.option }}
        run: |
          yarn test --silent --verbose $MATRIX_OPTION src/experiment-tracking/components
      - name: Stop sampler and post resource chart
        if: always()
        run: |
          kill "$(cat /tmp/sampler.pid)" 2>/dev/null || true
          if [ ! -s /tmp/metrics.csv ]; then
            exit 0
          fi
          N=$(wc -l < /tmp/metrics.csv)
          STEP=$(( N / 30 + 1 ))
          awk -v step="$STEP" 'NR % step == 0' /tmp/metrics.csv > /tmp/s.csv
          LABELS=$(awk -F, 'BEGIN{p="["} {p=p"\"T" NR "\","} END{sub(/,$/,"",p); print p"]"}' /tmp/s.csv)
          CPU=$(awk -F, '{printf "%s,",$2}' /tmp/s.csv | sed 's/,$//')
          MEM=$(awk -F, '{printf "%s,",$3}' /tmp/s.csv | sed 's/,$//')
          {
            echo '## CPU usage (%)'
            echo '```mermaid'
            echo 'xychart-beta'
            echo "  x-axis $LABELS"
            echo '  y-axis "CPU %" 0 --> 100'
            echo "  line [$CPU]"
            echo '```'
            echo
            echo '## Memory used (MB)'
            echo '```mermaid'
            echo 'xychart-beta'
            echo "  x-axis $LABELS"
            echo '  y-axis "Memory MB"'
            echo "  line [$MEM]"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Run build
        env:
          # Prevent warnings (emitted from react-pdf) from being treated as errors
          # https://github.com/wojtekmaj/react-pdf/issues/280
          CI: false
        run: |
          yarn build
