name: JS

on:
  workflow_dispatch:
  push:
    paths:
      - mlflow/server/js/**
      - .github/actions/check-component-ids/**
      - .github/workflows/js.yml
    branches:
      - master
      - branch-[0-9]+.[0-9]+
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - mlflow/server/js/**
      - .github/actions/check-component-ids/**
      - .github/workflows/js.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  check-component-ids:
    if: github.event_name != 'pull_request' || (github.event.pull_request.draft == false || github.event.pull_request.user.login == 'Copilot' && github.event.pull_request.user.type == 'Bot')
    permissions:
      contents: read
    timeout-minutes: 5
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Check componentId registry
        uses: ./.github/actions/check-component-ids

  js:
    if: github.event_name != 'pull_request' || (github.event.pull_request.draft == false || github.event.pull_request.user.login == 'Copilot' && github.event.pull_request.user.type == 'Bot')
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        option: [--testPathPattern, --testPathIgnorePatterns]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mlflow/server/js
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node
      - name: Install dependencies
        run: |
          yarn install --immutable
      - name: Run lint
        run: |
          yarn lint
      - name: Run prettier
        run: |
          yarn prettier:check
      # TODO: Disabled for now. Revisit after DAIS.
      # - name: Run knip
      #   run: |
      #     yarn knip
      - name: Run extract-i18n lint
        run: |
          yarn i18n:check
      - name: Run type-check
        run: |
          yarn type-check
      - name: Run tests
        env:
          MATRIX_OPTION: ${{ matrix.option }}
        run: |
          SUFFIX="${MATRIX_OPTION#--}"
          yarn test --silent $MATRIX_OPTION src/experiment-tracking/components \
            --json --outputFile=jest-results-${SUFFIX}.json
      - name: Filter Jest results
        if: failure()
        env:
          MATRIX_OPTION: ${{ matrix.option }}
        run: |
          SUFFIX="${MATRIX_OPTION#--}"
          if [ -f jest-results-${SUFFIX}.json ]; then
            jq '[.testResults[] | .assertionResults[]
                  | select(.status != "passed" or .duration > 1000)
                  | {name: .fullName, status, duration, failureMessages}]' \
              jest-results-${SUFFIX}.json > jest-failures-${SUFFIX}.json
          fi
      - name: Upload Jest results
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: jest-failures-${{ matrix.option }}
          path: mlflow/server/js/jest-failures-*.json
          retention-days: 7
          if-no-files-found: ignore
      - name: Run build
        env:
          # Prevent warnings (emitted from react-pdf) from being treated as errors
          # https://github.com/wojtekmaj/react-pdf/issues/280
          CI: false
        run: |
          yarn build
