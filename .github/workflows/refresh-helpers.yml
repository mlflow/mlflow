name: refresh-helpers

on:
  schedule:
    - cron: "0 8 * * 0"  # Sundays 08:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Regenerate helpers index
        run: python .claude/orchestrator/scripts/generate_helpers_md.py
      - name: Open auto-merge PR if helpers changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh mlflow-reviewer helpers index"
          title: "Auto-refresh mlflow-reviewer helpers index"
          body: |
            Weekly regeneration of `.claude/orchestrator/repo_knowledge/helpers_*.md`.

            Generated by `.github/workflows/refresh-helpers.yml`.
          branch: bot/refresh-helpers
          delete-branch: true
          labels: |
            area/build
            rn/none
