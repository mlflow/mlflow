name: "pipdeptree"
description: "pipdeptree"
runs:
  using: "composite"
  steps:
    - shell: bash
      run: |
        if [ -e .venv/bin/activate ]; then
          # Linux
          source .venv/bin/activate
        elif [ -e .venv/Scripts/activate ]; then
          # Windows
          source .venv/Scripts/activate
        fi
        uv pip install --system pipdeptree
        pipdeptree --all
