image:
  repository: ghcr.io/mlflow/mlflow
  # Defaults to chart appVersion when empty
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

# Deployment update strategy. When not set, defaults to Recreate if the storage
# PVC access mode is ReadWriteOnce or a SQLite backend store URI is configured;
# otherwise defaults to RollingUpdate.
# deploymentStrategy:
#   type: Recreate
deploymentStrategy: {}

# MLflow server CLI options.
# Run `mlflow server --help` for the full list.
server:
  # value_options: key/value pairs rendered as --key=value.
  # Key names match MLflow CLI flags (hyphens replaced with underscores).
  # Empty-string values are omitted.
  value_options:
    host: "0.0.0.0"
    port: 5000

    # Number of gunicorn worker processes.
    workers: 4

  # flag_options: bare flags rendered as --flag (no value).
  # Each item is a CLI flag name (hyphens or underscores both accepted).
  # Example: [serve_artifacts, no_serve_artifacts]
  flag_options: []

  # staticPrefix: path prefix when MLflow is served under a subpath (e.g. /mlflow).
  # Aligns the --static-prefix server arg and liveness/readiness probe paths.
  staticPrefix: ""


# Run `mlflow db upgrade` in an init container before the server starts.
# Disable only if the database schema is managed externally.
migrate:
  enabled: false

service:
  type: ClusterIP
  port: 5000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: mlflow.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

mlflow:
  backendStoreUri: ""
  backendStoreUriFrom: {}
  registryStoreUri: ""
  registryStoreUriFrom: {}
  defaultArtifactRoot: ""
  artifactsDestination: ""

# Extra environment variables injected into both init and main containers.
# Useful for database passwords, S3 credentials, etc.
# env:
#   - name: MLFLOW_DATABASE_PASSWORD
#     valueFrom:
#       secretKeyRef:
#         name: mlflow-db-secret
#         key: password
env: []

# Extra envFrom sources (ConfigMaps, Secrets).
envFrom: []

extraVolumes: []
extraVolumeMounts: []
extraInitContainers: []
extraContainers: []

tls:
  enabled: false
  secretName: mlflow-tls

networkPolicy:
  enabled: false
  additionalEgressRules: []

metrics:
  enabled: false
  path: /metrics

serviceMonitor:
  enabled: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: false
  extraRules: []

storage:
  enabled: false
  size: 10Gi
  accessMode: ReadWriteOnce
  storageClassName: ""
  mountPath: /mlflow

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 250m
  #   memory: 256Mi

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}
