# Example
# Usage:
#   helm upgrade --install mlflow ./charts --namespace mlflow --create-namespace -f example-mlflow-charts.yaml

image:
  repository: ghcr.io/mlflow/mlflow
  tag: "v3.10.1-full"

replicaCount: 1

# MLflow server options — names match `mlflow server --help` flags exactly.
server:
  value_options:
    # --- Backend store (metadata) ---
    # Option A: inline URI (password visible in values).
    # backend_store_uri: "postgresql://<username>:<encoded_password>@<endpoint>:5432/<database-name>"
    #
    # Option B: load the full URI from a Kubernetes Secret (recommended).
    # Create the secret first:
    #   kubectl create secret generic mlflow-db-secret \
    #     --from-literal="uri=postgresql://<username>:<password>@<endpoint>:5432/<database-name>"
    # Then omit backend_store_uri here and inject it via env below as
    # MLFLOW_BACKEND_STORE_URI — MLflow reads this env var automatically.

    # --- Artifact store ---
    # Leave empty to co-locate artifacts with the backend store.
    default_artifact_root: "s3://my-bucket/mlflow"
    # S3 example:
    # default_artifact_root: "s3://my-bucket/mlflow"
    # artifacts_destination: "s3://my-bucket/mlflow"

    host: "0.0.0.0"
    port: 5000
    workers: 4

    # Uncomment to enable basic-auth plugin:
    # app_name: "basic-auth"

    # Expose Prometheus metrics:
    # expose_prometheus: "/metrics"

  # Bare flags (no value). Rendered as --flag.
  flag_options:
    - no_serve_artifacts

# Run `mlflow db upgrade` before the server starts (recommended for SQL backends).
migrate:
  enabled: true

service:
  type: ClusterIP
  port: 5000

# Expose via Ingress:
# ingress:
#   enabled: true
#   className: "nginx"
#   hosts:
#     - host: mlflow.example.com
#       paths:
#         - path: /
#           pathType: Prefix

# Inject credentials as environment variables:
env:
  # Load the full backend store URI (with password) from a Kubernetes Secret.
  # MLflow reads MLFLOW_BACKEND_STORE_URI automatically, so no CLI flag is needed.
  - name: MLFLOW_BACKEND_STORE_URI
    valueFrom:
      secretKeyRef:
        name: mlflow-db-secret
        key: uri
  # S3 credentials:
  # Create the secret first:
  # kubectl create secret generic s3-credentials \
  #  --from-literal="ccess-key-id=<your key id>" \
  #  --from-literal="secret-access-key=<your key value>"
  #
  # - name: AWS_ACCESS_KEY_ID
  #   valueFrom:
  #     secretKeyRef:
  #       name: s3-credentials
  #       key: access-key-id
  # - name: AWS_SECRET_ACCESS_KEY
  #   valueFrom:
  #     secretKeyRef:
  #       name: s3-credentials
  #       key: secret-access-key

resources:
  requests:
    cpu: 1000m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi
